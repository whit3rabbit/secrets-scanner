name: Publish Node Bindings to NPM

# Multi-platform NAPI-RS publish: build the native addon for each target on a
# native runner, then publish one per-platform package per target plus a thin
# main package whose optionalDependencies select the right binary at install.
#
# Triggers:
#   - tag push v* -> real publish (alongside release.yml).
#   - workflow_dispatch -> defaults to a dry run that builds every target and
#     validates packaging WITHOUT publishing (use this before cutting a tag).

on:
  push:
    tags:
      - "v[0-9]*"
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Build all targets and validate packaging without publishing"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # Required for NPM provenance publishing

defaults:
  run:
    working-directory: bindings/node

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-apple-darwin
            runner: macos-13
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04-arm
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      # `npm install`, not `npm ci`: the main package declares optionalDependencies
      # on the per-platform packages, which do not exist on the registry until the
      # first successful publish, so npm cannot record them in the lockfile and
      # `npm ci` would fail the sync check. Direct devDependencies are pinned exact,
      # so installs stay reproducible. Missing optional deps are non-fatal.
      - name: Install Node dependencies
        run: npm install --no-audit --no-fund

      # --platform suffixes the artifact (secrets_scanner_core.<target>.node) so
      # `napi artifacts` can route it; --no-js preserves the hand-written index.js
      # loader. --locked is passed through to cargo for a reproducible build.
      - name: Build ${{ matrix.target }}
        run: npx napi build --release --platform --no-js --target ${{ matrix.target }} -- --locked

      # Each runner is native to its target, so the freshly built binary loads
      # here; this proves the artifact actually works before publishing.
      - name: Test built artifact
        run: npm test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: bindings/node/secrets_scanner_core.*.node
          if-no-files-found: error

  publish:
    name: Publish to NPM
    needs: build
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_CONFIG_PROVENANCE: "true"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org/"

      # `npm install`, not `npm ci`: the main package declares optionalDependencies
      # on the per-platform packages, which do not exist on the registry until the
      # first successful publish, so npm cannot record them in the lockfile and
      # `npm ci` would fail the sync check. Direct devDependencies are pinned exact,
      # so installs stay reproducible. Missing optional deps are non-fatal.
      - name: Install Node dependencies
        run: npm install --no-audit --no-fund

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: bindings/node/artifacts
          pattern: bindings-*
          merge-multiple: true

      # Fail-safe: only a tag push (or an explicit dispatch with dry-run=false)
      # publishes. Any other dispatch -- including one with no inputs, e.g. when
      # the input schema is not yet on the default branch -- is a dry run, so a
      # validation run can never publish by accident.
      - name: Resolve dry-run flag
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ "${{ inputs.dry-run }}" = "false" ]; then
            echo "dry=" >> "$GITHUB_OUTPUT"
          else
            echo "dry=--dry-run" >> "$GITHUB_OUTPUT"
            echo "::notice::Dry run: building and packaging all targets, no publish."
          fi

      - name: Create per-platform package dirs
        run: npx napi create-npm-dirs --npm-dir npm

      - name: Move artifacts into platform packages
        run: npx napi artifacts --output-dir ./artifacts --npm-dir ./npm

      # Publishes the per-platform optionalDependency packages and syncs the main
      # package.json. No --gh-release (release.yml already creates the release).
      - name: Publish platform packages
        run: npx napi pre-publish -t npm --npm-dir npm ${{ steps.mode.outputs.dry }}

      # --ignore-scripts: the main package ships no binary, so skip the prepack
      # rebuild (the publish runner has no Rust toolchain).
      - name: Publish main package
        run: npm publish --provenance --access public --ignore-scripts ${{ steps.mode.outputs.dry }}
