name: Release

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    name: Verify tag matches Cargo.toml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check tag == Cargo.toml version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          CARGO_VER=$(sed -nE 's/^version = "([^"]+)".*/\1/p' Cargo.toml | head -1)
          if [ "v${CARGO_VER}" != "${TAG}" ]; then
            echo "::error::tag ${TAG} does not match Cargo.toml version v${CARGO_VER}"
            echo "Bump [package].version in Cargo.toml to match the release tag."
            exit 1
          fi
          echo "OK: ${TAG} matches Cargo.toml v${CARGO_VER}"

      - name: Check tag == Dockerfile version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          DOCKER_VER=$(grep -iE '^LABEL +version=' Dockerfile | head -1 | sed -nE 's/.*version="([^"]+)".*/\1/p')
          if [ -z "${DOCKER_VER}" ]; then
            echo "::error::No version label found in Dockerfile (expected LABEL version=\"X.Y.Z\")"
            exit 1
          fi
          if [ "v${DOCKER_VER}" != "${TAG}" ]; then
            echo "::error::tag ${TAG} does not match Dockerfile version v${DOCKER_VER}"
            echo "Bump LABEL version in Dockerfile to match the release tag."
            exit 1
          fi
          echo "OK: ${TAG} matches Dockerfile v${DOCKER_VER}"


  build:
    name: Build ${{ matrix.target }}
    needs: [check-version]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            ext: ""
            homebrew_suffix: ""
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            ext: ""
            homebrew_suffix: ""
          - target: x86_64-apple-darwin
            os: macos-15-intel
            ext: ""
            homebrew_suffix: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-14
            ext: ""
            homebrew_suffix: macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
            homebrew_suffix: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux musl)
        if: runner.os == 'Linux'
        run: cargo install cross --version "=0.2.5" --locked

      - name: Build with cross (Linux musl)
        if: runner.os == 'Linux'
        run: cross build --locked --release --target ${{ matrix.target }} --features updater

      - name: Build (macOS/Windows)
        if: runner.os != 'Linux'
        run: cargo build --locked --release --target ${{ matrix.target }} --features updater

      - name: Package binary
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          EXT: ${{ matrix.ext }}
          HOMEBREW_SUFFIX: ${{ matrix.homebrew_suffix }}
          VERSION: ${{ github.ref_name }}
        run: |
          VER="${VERSION#v}"
          mkdir -p dist
          BINARY="target/${TARGET}/release/secrets-scanner${EXT}"
          ASSET="secrets-scanner-${VER}-${TARGET}${EXT}"
          cp "$BINARY" "dist/${ASSET}"
          if [ -n "${HOMEBREW_SUFFIX}" ]; then
            cp "$BINARY" dist/secrets-scanner
            (cd dist && zip "secrets-scanner-${VER}-${HOMEBREW_SUFFIX}.zip" secrets-scanner)
            rm dist/secrets-scanner
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: secrets-scanner-${{ matrix.target }}
          path: dist/

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum -- * > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false


  publish-crate:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set +e
          cargo publish --locked 2>&1 | tee /tmp/cargo-publish.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "${status}" -eq 0 ]; then
            exit 0
          fi
          if grep -F "already exists on crates.io index" /tmp/cargo-publish.log >/dev/null; then
            exit 0
          fi
          exit "${status}"

  update-homebrew-cask:
    name: Update Homebrew Cask
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Decide whether to update Homebrew cask
        id: tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          REPOSITORY_PRIVATE: ${{ github.event.repository.private }}
        run: |
          if [ -z "${TAP_TOKEN}" ]; then
            echo "::notice::Skipping Homebrew cask update: HOMEBREW_TAP_TOKEN is not set."
            echo "available=false" >> "$GITHUB_OUTPUT"
          elif [ "${REPOSITORY_PRIVATE}" = "true" ]; then
            echo "::notice::Skipping Homebrew cask update: repository is private, so release asset URLs are not Homebrew-installable."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set version
        id: ver
        if: steps.tap.outputs.available == 'true'
        run: echo "VER=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256 from published release assets
        id: sha
        if: steps.tap.outputs.available == 'true'
        env:
          VER: ${{ steps.ver.outputs.VER }}
        run: |
          BASE="https://github.com/whit3rabbit/secrets-scanner/releases/download/v${VER}"
          curl -fsSL "${BASE}/secrets-scanner-${VER}-macos-arm64.zip" -o arm64.zip
          curl -fsSL "${BASE}/secrets-scanner-${VER}-macos-x86_64.zip" -o x86_64.zip
          ARM_SHA=$(sha256sum arm64.zip | awk '{print $1}')
          X86_SHA=$(sha256sum x86_64.zip | awk '{print $1}')
          echo "arm=${ARM_SHA}" >> "$GITHUB_OUTPUT"
          echo "x86=${X86_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout Homebrew tap
        if: steps.tap.outputs.available == 'true'
        uses: actions/checkout@v6
        with:
          repository: whit3rabbit/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Generate cask
        if: steps.tap.outputs.available == 'true'
        env:
          VER: ${{ steps.ver.outputs.VER }}
          ARM: ${{ steps.sha.outputs.arm }}
          X86: ${{ steps.sha.outputs.x86 }}
        run: |
          bash scripts/render_homebrew_cask.sh \
            packaging/homebrew/Casks/secrets-scanner.rb \
            homebrew-tap/Casks/secrets-scanner.rb \
            "${VER}" \
            "${ARM}" \
            "${X86}"
          ruby -c homebrew-tap/Casks/secrets-scanner.rb

      - name: Commit and push cask
        if: steps.tap.outputs.available == 'true'
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/secrets-scanner.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update secrets-scanner cask to ${{ steps.ver.outputs.VER }}"
          git push origin main

  publish-docker:
    name: Publish Docker Image
    # Gate on the crate publish so a Docker :latest/:X.Y.Z is never pushed for a
    # version whose crates.io publish failed (avoids a half-released version).
    needs: publish-crate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: followthewhit3rabbit/secrets-scanner
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

