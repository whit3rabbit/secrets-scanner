# Release workflow for secrets-scanner.
#
# Triggered by pushing a tag matching `v*`.
# Builds static binaries for Linux (musl), macOS (x86_64 + aarch64), and Windows,
# then creates a GitHub Release with the artifacts.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux musl)
        if: runner.os == 'Linux'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with cross (Linux musl)
        if: runner.os == 'Linux'
        run: cross build --release --target ${{ matrix.target }} --features updater

      - name: Build (macOS/Windows)
        if: runner.os != 'Linux'
        run: cargo build --release --target ${{ matrix.target }} --features updater

      - name: Package binary
        shell: bash
        run: |
          BINARY="target/${{ matrix.target }}/release/secrets-scanner${{ matrix.ext }}"
          ARCHIVE="secrets-scanner-${{ matrix.target }}${{ matrix.ext }}"
          cp "$BINARY" "$ARCHIVE"
          echo "archive=$ARCHIVE" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: secrets-scanner-${{ matrix.target }}
          path: secrets-scanner-${{ matrix.target }}${{ matrix.ext }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum secrets-scanner-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            secrets-scanner-*
            checksums.txt
          generate_release_notes: true
