# Example: scan this repo with the bundled action and upload SARIF to GitHub
# code scanning. This file dogfoods `uses: ./` and doubles as the copy-paste
# reference for consumers.
#
# Notes for consumers:
#   - Pin a version with `version: vX.Y.Z` for deterministic builds. Without it
#     the action fetches the latest GitHub release (non-reproducible).
#   - It is non-blocking here (`fail-on-findings: false`): findings are surfaced
#     via SARIF/code scanning, not by failing the job. Flip to `true` (or add a
#     separate gate step) to block merges on findings.
name: Secrets Scan

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so `--git-tracked`, `base`, and history mode have refs to work with.
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - id: scan
        uses: ./
        with:
          path: "."
          # Build from source since no release has been published yet. Once a release
          # exists, switch to 'version: vX.Y.Z' and drop this.
          build-from-source: true
          # Do not fail the job; gate via the uploaded SARIF instead.
          fail-on-findings: false
          # For PR-only diff scans, uncomment:
          # base: origin/${{ github.base_ref }}

      - name: Upload SARIF
        if: always() && steps.scan.outputs.sarif-file != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif-file }}
