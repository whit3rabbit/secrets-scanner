name: "Secrets Scanner"
description: "Scan repository content for committed secrets and emit SARIF for GitHub code scanning."
author: "whit3rabbit"
branding:
  icon: "shield"
  color: "red"

inputs:
  path:
    description: "Path to scan."
    default: "."
  config:
    description: "Optional path to a custom TOML rules file."
    required: false
  fail-on-findings:
    description: "Fail the job when findings are detected. Set false to upload SARIF then gate separately."
    default: "true"
  sarif:
    description: "Write SARIF output."
    default: "true"
  sarif-file:
    description: "SARIF output path."
    default: "secrets-scanner.sarif"
  git-tracked:
    description: "Scan only files currently tracked by git."
    default: "true"
  base:
    description: "Optional base ref for changed-files scanning (e.g. origin/main). Implies --changed-files."
    required: false
  max-file-size:
    description: "Maximum file size in bytes."
    default: "2097152"
  binary-policy:
    description: "Binary-file handling: auto | skip | scan."
    default: "auto"
  version:
    description: "Release version to install (e.g. v0.2.0). Defaults to the action ref, else warns and uses latest."
    required: false
  extra-args:
    description: "Additional newline-delimited arguments passed to `secrets-scanner scan`."
    required: false

outputs:
  sarif-file:
    description: "Path to the written SARIF file (empty when sarif=false)."
    value: ${{ steps.scan.outputs.sarif-file }}

runs:
  using: "composite"
  steps:
    - name: Install secrets-scanner (prebuilt binary)
      shell: bash
      env:
        REPO: "whit3rabbit/secrets-scanner"
        INPUT_VERSION: ${{ inputs.version }}
        ACTION_REF: ${{ github.action_ref }}
      run: |
        set -euo pipefail
        os="$(uname -s)"; arch="$(uname -m)"
        case "$os" in
          Linux)  [ "$arch" = "x86_64" ] && target="x86_64-unknown-linux-musl" || { echo "::error::unsupported Linux arch $arch"; exit 1; } ;;
          Darwin) { [ "$arch" = "arm64" ] || [ "$arch" = "aarch64" ]; } && target="aarch64-apple-darwin" || target="x86_64-apple-darwin" ;;
          *) echo "::error::unsupported OS $os (use a Linux or macOS runner)"; exit 1 ;;
        esac

        version="${INPUT_VERSION:-}"
        if [ -z "$version" ] && [[ "${ACTION_REF:-}" == v*.*.* ]]; then version="$ACTION_REF"; fi
        if [ -z "$version" ]; then
          echo "::warning::version is not set and action ref '${ACTION_REF:-}' is not a semver tag; falling back to latest release (non-reproducible)."
          version="$(curl -fsSL -H 'Accept: application/vnd.github+json' \
            "https://api.github.com/repos/${REPO}/releases/latest" \
            | sed -nE 's/.*"tag_name": *"([^"]+)".*/\1/p' \
            | head -n 1)"
        fi
        [ -n "$version" ] || { echo "::error::could not resolve a release version"; exit 1; }
        case "$version" in v*) tag="$version"; ver="${version#v}" ;; *) tag="v$version"; ver="$version" ;; esac

        dest="${RUNNER_TEMP}/secrets-scanner-bin"
        mkdir -p "$dest"
        asset="secrets-scanner-${ver}-${target}"
        base="https://github.com/${REPO}/releases/download/${tag}"
        url="${base}/${asset}"
        echo "Downloading $url"
        curl -fsSL "$url" -o "${dest}/secrets-scanner"
        curl -fsSL "${base}/SHA256SUMS" -o "${dest}/SHA256SUMS"
        expected="$(awk -v asset="$asset" '$2 == asset { print $1; found = 1 } END { if (!found) exit 1 }' "${dest}/SHA256SUMS")" || {
          echo "::error::SHA256SUMS does not contain ${asset}"
          exit 1
        }
        if command -v sha256sum >/dev/null 2>&1; then
          actual="$(sha256sum "${dest}/secrets-scanner" | awk '{ print $1 }')"
        else
          actual="$(shasum -a 256 "${dest}/secrets-scanner" | awk '{ print $1 }')"
        fi
        if [ "$expected" != "$actual" ]; then
          echo "::error::checksum mismatch for ${asset}"
          echo "::error::expected ${expected}"
          echo "::error::actual   ${actual}"
          exit 1
        fi
        chmod +x "${dest}/secrets-scanner"
        echo "$dest" >> "$GITHUB_PATH"

    - name: Run secrets-scanner
      id: scan
      shell: bash
      env:
        IN_PATH: ${{ inputs.path }}
        IN_CONFIG: ${{ inputs.config }}
        IN_FAIL: ${{ inputs.fail-on-findings }}
        IN_SARIF: ${{ inputs.sarif }}
        IN_SARIF_FILE: ${{ inputs.sarif-file }}
        IN_GIT_TRACKED: ${{ inputs.git-tracked }}
        IN_BASE: ${{ inputs.base }}
        IN_MAX_FILE_SIZE: ${{ inputs.max-file-size }}
        IN_BINARY_POLICY: ${{ inputs.binary-policy }}
        IN_EXTRA: ${{ inputs.extra-args }}
      run: |
        set -euo pipefail
        # Safe-by-default posture: redaction on, no context lines in CI logs,
        # bounded reads, deterministic exit. SARIF is uploaded by a later step.
        args=(scan "$IN_PATH" --no-context --max-file-size "$IN_MAX_FILE_SIZE" --binary-policy "$IN_BINARY_POLICY")
        [ "$IN_GIT_TRACKED" = "true" ] && args+=(--git-tracked)
        [ -n "$IN_BASE" ] && args+=(--base "$IN_BASE")
        [ -n "$IN_CONFIG" ] && args+=(--rules "$IN_CONFIG")
        if [ "$IN_SARIF" = "true" ]; then
          args+=(--format sarif --output "$IN_SARIF_FILE")
          echo "sarif-file=$IN_SARIF_FILE" >> "$GITHUB_OUTPUT"
        else
          echo "sarif-file=" >> "$GITHUB_OUTPUT"
        fi
        # When not failing on findings, never let exit 1 fail the step.
        [ "$IN_FAIL" = "true" ] || args+=(--no-fail)
        if [ -n "$IN_EXTRA" ]; then
          while IFS= read -r arg; do
            [ -n "$arg" ] && args+=("$arg")
          done <<< "$IN_EXTRA"
        fi
        secrets-scanner "${args[@]}"
