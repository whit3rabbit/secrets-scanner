description = "Detected OneLogin Client Secret (kingfisher, confidence: medium)"
regex       = '''(?xi)
\b
one[\s_.-]*login
(?:.|[\n\r]){0,64}?
(?:
  api[\s_.-]*client[\s_.-]*secret
|
  client[\s_.-]*secret
|
  api[\s_.-]*secret
|
  [\s_.\-:"'=]secret\b
)
(?:.|[\n\r]){0,20}?
[=:"'\s_-]*
(?:secret[_-])?
(
  [a-z0-9]{64}
)
\b
'''
keywords    = ["onelogin"]
entropy     = 3.4
secretGroup = 1

