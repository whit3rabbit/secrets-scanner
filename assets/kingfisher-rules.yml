            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid

            # If the app token is invalid, Lark uses 20014 (and sometimes 99991664 for invalid app token).
            - type: WordMatch
              negative: true
              match_all_words: false
              words:
                - '"code":20014'
                - '"code": 20014'
                - '"code":99991664'
                - '"code": 99991664'
