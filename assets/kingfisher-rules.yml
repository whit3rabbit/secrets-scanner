              # Extract the first key ID from the list
              KEY_ID:
                type: JsonPath
                path: "$.keys[0].id"
          
          # Step 2: Delete the key using its ID
          - name: delete_key
            request:
              method: DELETE
              url: https://api.tailscale.com/api/v2/tailnet/-/keys/{{ KEY_ID }}
              headers:
                Authorization: "Bearer {{ TOKEN }}"
              response_matcher:
                - report_response: true
                - type: StatusMatch
                  status: [200]
