      - '$8$mTj4RZG8N9ZDOk$elY/asfm8kD3iDmkBe3hD2r4xcA/0oWS5V3os.O91u.'
  - name: Password Hash (Kerberos 5, etype 23, AS-REP)
    id: kingfisher.krb5.asrep.23.1
    pattern: |
      (?x)
      (
      \$ krb5asrep
      \$ 23
      \$
      (?: [^:]+ : )?
      [0-9a-f]{32}
      \$ [0-9a-f]{64,}
