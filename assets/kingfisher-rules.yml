            - status:
                - 200
              type: StatusMatch
            - type: JsonValid
          url: '{{ JIRA_BASE_URL }}/rest/api/latest/myself'
    revocation:
      type: HttpMultiStep
      content:
        steps:
          - name: lookup_token_id
            request:
              method: GET
              url: '{{ JIRA_BASE_URL }}/rest/pat/latest/tokens'
              headers:
                Accept: application/json
                Authorization: Bearer {{ TOKEN }}
              response_matcher:
                - type: StatusMatch
                  status: [200]
                - type: JsonValid
            extract:
              JIRA_TOKEN_ID:
                type: JsonPath
                path: "$[0].id"
          - name: revoke_token
            request:
              method: DELETE
              url: '{{ JIRA_BASE_URL }}/rest/pat/latest/tokens/{{ JIRA_TOKEN_ID }}'
              headers:
                Authorization: Bearer {{ TOKEN }}
              response_matcher:
                - report_response: true
                - type: StatusMatch
                  status: [204]
