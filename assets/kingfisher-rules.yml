      (?P<TOKEN_ID>
        (?:ak|as)-[A-Za-z0-9]{22}
      )
      \b
      (?:.|[\n\r]){0,80}?
      \b
      (
        (?:ak|as)-[A-Za-z0-9]{22}
      )
      \b
