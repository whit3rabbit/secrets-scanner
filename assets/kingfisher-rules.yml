  - name: Voyage AI API Key
    id: kingfisher.voyageai.api_key
    description: Detects Voyage AI API keys used for embedding and retrieval models.
    # Matches keys starting with 'pa-' followed by 43 URL-safe base64 characters
    pattern: |
      (?x)
      \b
      (
        pa-[a-zA-Z0-9\-_]{43}
      )
      \b
    min_entropy: 4.0
    confidence: medium
    examples:
      - pa-r4yuCYCuPhNO-10Lu9aO7dR4jxUWlLmlUjm_NOVVdSs
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.voyageai.com/v1/files
          headers:
            Authorization: "Bearer {{ TOKEN }}"
          response_matcher:
            # 200 = key has /v1/files permission, 403 = valid key without that permission
            # (e.g. an inference-only key). 401 with "Provided API key is invalid." is the
            # only response Voyage AI returns for a bad key, so any non-401 status is live.
            - type: StatusMatch
              status: [401]
              negative: true
            - type: WordMatch
              words:
                - "Provided API key is invalid"
              negative: true
    references:
      - https://docs.voyageai.com/reference
      - https://docs.voyageai.com/docs/api-key-and-installation
  - name: Voyage AI API Key
    id: kingfisher.voyageai.api_key.2
    description: Detects Voyage AI API keys (al- prefix variant) used for embedding and retrieval models.
    # Matches keys starting with 'al-' followed by 43 URL-safe base64 characters
    pattern: |
      (?x)
      \b
      (
        al-[a-zA-Z0-9\-_]{43}
      )
      \b
    min_entropy: 4.0
    confidence: medium
    examples:
      - al-Qf7M2bZ8xnLpvE4hRcDsJtAo1KyU93WgIBmXrNVoYTu
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.voyageai.com/v1/files
          headers:
            Authorization: "Bearer {{ TOKEN }}"
          response_matcher:
            # 200 = key has /v1/files permission, 403 = valid key without that permission.
            # 401 with "Provided API key is invalid." is the only invalid-key response.
            - type: StatusMatch
              status: [401]
              negative: true
            - type: WordMatch
              words:
                - "Provided API key is invalid"
              negative: true
    references:
      - https://docs.voyageai.com/reference
      - https://docs.voyageai.com/docs/api-key-and-installation
# NOTE: Revocation is not implemented because Voyage AI does not document a public REST
# endpoint for programmatic API key revocation. All probed admin/key-management paths
# under api.voyageai.com return 404. Keys must be revoked via the Voyage AI dashboard.
  - name: Vultr API Key
    id: kingfisher.vultr.1
    pattern: |
      (?xi)
      \b
      vultr
      (?:.|[\n\r]){0,24}?
      (?:api[_\s-]*key|token|authorization|key)
      (?:.|[\n\r]){0,16}?
      (
        [a-f0-9]{36}
      )
      \b
    pattern_requirements:
      min_digits: 3
    min_entropy: 3.4
    confidence: medium
    examples:
      - VULTR_API_KEY="7a1c3e5f7092ab4cd6ef80123456789abcde"
      - 'export VULTR_TOKEN=0123456789abcdef0123456789abcedf1234  # vultr'
    references:
      - https://docs.vultr.com/platform/other/api/current-user/list-api-key
      - https://docs.vultr.com/platform/other/api/current-user/delete-api-key
      - https://www.vultr.com/api/
    validation:
      type: Http
      content:
        request:
          method: GET
          url: https://api.vultr.com/v2/apikeys
          headers:
            Authorization: "Bearer {{ TOKEN }}"
            Accept: application/json
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: JsonValid
            - type: WordMatch
              words:
                - '"apikeys"'
    revocation:
      type: HttpMultiStep
      content:
        steps:
          - name: list_api_keys
            request:
              method: GET
              url: https://api.vultr.com/v2/apikeys
              headers:
                Authorization: "Bearer {{ TOKEN }}"
                Accept: application/json
              response_matcher:
                - type: StatusMatch
                  status: [200]
                - type: JsonValid
            extract:
              APIKEY_ID:
                type: Regex
                pattern: '"id"\\s*:\\s*"([^"]+)"'
          - name: delete_api_key
            request:
              method: DELETE
              url: https://api.vultr.com/v2/apikeys/{{ APIKEY_ID }}
              headers:
                Authorization: "Bearer {{ TOKEN }}"
              response_matcher:
                - report_response: true
                - type: StatusMatch
                  status: [204]
