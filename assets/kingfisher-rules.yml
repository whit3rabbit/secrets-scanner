    pattern_requirements:
      min_digits: 4
    min_entropy: 3.4
    confidence: medium
    examples:
      - 'HARNESS_TOKEN="pat.AbCdEfGhIjKlMnOpQrStUv.0123abcd4567ef890123abcd.ZyXwVuTsRqPoNmLkJiHg"'
    references:
      - https://developer.harness.io/docs/platform/automation/api/api-quickstart/
      - https://apidocs.harness.io/
    validation:
      type: Http
      content:
        request:
          method: GET
          # Use an endpoint that does not require additional query params.
          url: https://app.harness.io/v1/orgs?limit=1&page=1
          headers:
            Accept: application/json
            x-api-key: "{{ TOKEN }}"
          response_matcher:
            - report_response: true
            # 403 can still mean a live token with restricted scope.
            - type: StatusMatch
              status: [200, 403]
            - type: StatusMatch
              status: [401]
              negative: true
            - type: JsonValid

    # Self-revocation support (delete the backing API key).
    #
    # Harness exposes DELETE /ng/api/apikey/{identifier}, authenticated with x-api-key,
    # and requires accountIdentifier/apiKeyType/parentIdentifier query parameters.
    #
    # Required runtime vars for revoke command:
    #   - ACCOUNTIDENTIFIER: Harness account ID
    #
    # API key metadata is derived from token validation in step 1.
    revocation:
      type: HttpMultiStep
      content:
        steps:
          - name: validate_token_and_extract_api_key
            request:
              method: POST
              url: https://app.harness.io/ng/api/token/validate?accountIdentifier={{ ACCOUNTIDENTIFIER }}
              headers:
                Accept: application/json
                x-api-key: "{{ TOKEN }}"
              response_matcher:
                - type: StatusMatch
                  status: [200]
                - type: JsonValid
            extract:
              APIKEYIDENTIFIER:
                type: JsonPath
                path: "$.data.apiKeyIdentifier"
              PARENTIDENTIFIER:
                type: JsonPath
                path: "$.data.parentIdentifier"
              APIKEYTYPE:
                type: JsonPath
                path: "$.data.apiKeyType"

          - name: delete_api_key
            request:
              method: DELETE
              url: https://app.harness.io/ng/api/apikey/{{ APIKEYIDENTIFIER }}?accountIdentifier={{ ACCOUNTIDENTIFIER }}&apiKeyType={{ APIKEYTYPE }}&parentIdentifier={{ PARENTIDENTIFIER }}
              headers:
                Accept: application/json
                x-api-key: "{{ TOKEN }}"
              response_matcher:
                - report_response: true
                - type: StatusMatch
                  status: [200, 204]
  - name: Password Hash (md5crypt)
    id: kingfisher.pwhash.1
    pattern: '(\$1\$[./A-Za-z0-9]{8}\$[./A-Za-z0-9]{22})'
    references:
      - https://en.wikipedia.org/wiki/Crypt_(C)#MD5-based_scheme
      - https://unix.stackexchange.com/a/511017
      - https://hashcat.net/wiki/doku.php?id=example_hashes
      - https://passwordvillage.org/salted.html#md5crypt
    pattern_requirements:
      min_digits: 2
    min_entropy: 3.3
    confidence: medium
    examples: # generated with `openssl passwd -1 -salt 'OKgLCmVl' 'a'`
      - '$1$OKgLCmVl$d02jECa4DXn/oXX0R.MoQ/'
      - '$1$28772684$iEwNOgGugqO9.bIz5sk8k/'
  - name: Password Hash (bcrypt)
    id: kingfisher.pwhash.2
    # Format from Wikipedia:
    #   $2<a/b/x/y>$[cost]$[22 character salt][31 character hash]
    pattern: '(\$2[abxy]\$\d+\$[./A-Za-z0-9]{53})'
    references:
      - https://en.wikipedia.org/wiki/Bcrypt
      - https://hashcat.net/wiki/doku.php?id=example_hashes
    min_entropy: 3.3
    confidence: medium
    examples:
      - '$2a$12$R9h/cIPz0gi.URNNX3kh2OPST9/PgBkqquzi.Ss7KIUgO2t0jWMUW'
      - '$2a$05$/VT2Xs2dMd8GJKfrXhjYP.DkTjOVrY12yDN7/6I8ZV0q/1lEohLru'
      - '$2a$05$Uo385Fa0g86uUXHwZxB90.qMMdRFExaXePGka4WGFv.86I45AEjmO'
      - '$2a$05$LhayLxezLhK1LhWvKxCyLOj0j1u.Kj0jZ0pEmm134uzrQlFvQJLF6'
      - '$2y$12$atWJ1Nx6ep65tNx0YIJ4I.jzgI86znQbNRI3lF0qIt/XCYnEPxSc2'
  - name: Password Hash (sha256crypt)
    id: kingfisher.pwhash.3
    pattern: |
      (?x)
      (
      \$ 5
      (?: \$ rounds=\d+ )?
      \$ [./A-Za-z0-9]{8,16}
      \$ [./A-Za-z0-9]{43}
      )
    pattern_requirements:
      min_digits: 2
    references:
      - https://en.wikipedia.org/wiki/Crypt_(C)#Key_derivation_functions_supported_by_crypt
      - https://hashcat.net/wiki/doku.php?id=example_hashes
      - https://passwordvillage.org/salted.html#sha256crypt
    min_entropy: 3.3
    confidence: medium
    examples:
      - '$5$rounds=5000$GX7BopJZJxPc/KEK$le16UF8I2Anb.rOrn22AUPWvzUETDGefUmAV8AZkGcD'
      - '$5$9ks3nNEqv31FX.F$gdEoLFsCRsn/WRN3wxUnzfeZLoooVlzeF4WjLomTRFD'
      - '$5$KAlz5SULZNybHwil$3UgmS1pmo2r5HG.tjbjzoVxISBh8IH81d.bJh4MCC19'
  - name: Password Hash (sha512crypt)
    id: kingfisher.pwhash.4
    pattern: |
      (?x)
      (
      \$ 6
      (?: \$ rounds=\d+ )?
      \$ [./A-Za-z0-9]{8,16}
      \$ [./A-Za-z0-9]{86}
      )
    pattern_requirements:
      min_digits: 2
    references:
      - https://en.wikipedia.org/wiki/Crypt_(C)#Key_derivation_functions_supported_by_crypt
      - https://hashcat.net/wiki/doku.php?id=example_hashes
