# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  assets/local.toml — Custom secrets-scanner rules                       ║
# ║                                                                          ║
# ║  These rules are merged with assets/gitleaks.toml at build time.         ║
# ║  Local rules take precedence over upstream rules with the same ID.       ║
# ║                                                                          ║
# ║  Rule format (gitleaks-compatible TOML):                                 ║
# ║                                                                          ║
# ║  [[rules]]                                                               ║
# ║  id          = "my-rule"           # unique, kebab-case                  ║
# ║  description = "Human-readable description of what this detects"         ║
# ║  regex       = 'MY_PREFIX_[A-Za-z0-9]{32,64}'  # Rust regex crate       ║
# ║  keywords    = ["my_prefix_"]      # lowercase, for Aho-Corasick         ║
# ║  entropy     = 3.5                 # optional: min Shannon bits/byte     ║
# ║  path        = '\.env$'            # optional: only scan matching files  ║
# ║  secretGroup = 1                   # optional: capture group index       ║
# ║                                                                          ║
# ║  [[rules.allowlists]]                                                    ║
# ║  description = "Ignore test fixtures"                                    ║
# ║  paths       = ['test_fixtures/', '_test\.go$']                          ║
# ║  stopwords   = ["example", "placeholder"]                                ║
# ║  regexes     = ['^MY_PREFIX_0{32}']                                      ║
# ║                                                                          ║
# ║  See README.md for full documentation.                                   ║
# ╚══════════════════════════════════════════════════════════════════════════╝

title = "local secrets-scanner"

[[rules]]
id = "aikido-api-client-secret"
description = "Identified a potential Aikido API Client Secret, which could lead to unauthorized access to Aikido services and sensitive data exposure."
regex = '''(?<![A-Za-z0-9_])(aikido_secret_[A-Za-z0-9]{20,128})(?![A-Za-z0-9_])'''
keywords = ["aikido"]

