# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  assets/secrets-scanner-rules.toml — Custom secrets-scanner rules         ║
# ║                                                                          ║
# ║  These rules are merged with other rulesets at build time.               ║
# ╚══════════════════════════════════════════════════════════════════════════╝

title = "secrets-scanner custom rules"

[[rules]]
id = "deepseek-api-key"
description = "Identified a potential DeepSeek API Key, which could lead to unauthorized access to DeepSeek services and sensitive data exposure."
regex = '''(?i)\b(?:DEEPSEEK_API_KEY|api\.deepseek\.com|deepseek)\b[^\r\n]{0,80}?\b(sk-[A-Za-z0-9]{20,128})\b|\b(sk-DeepSeek[A-Za-z0-9]{16,96})\b'''
keywords = ["deepseek", "sk-deepseek"]

[[rules]]
id = "mistral-ai-api-key"
description = "Identified a potential Mistral AI API Key, which could lead to unauthorized access to Mistral AI services and sensitive data exposure."
regex = '''\b(mistral_[A-Za-z0-9_-]{20,160})\b'''
keywords = ["mistral", "mistral_"]

[[rules]]
id = "mongodb-atlas-db-uri-with-credentials"
description = "Identified a potential MongoDB Atlas Database URI with credentials, which could lead to unauthorized access to MongoDB services and sensitive data exposure."
regex = '''(?i)\bmongodb(?:\+srv)?://[^\s:/?#]+:[^\s@/]+@[^\s]+'''
keywords = ["mongodb"]

[[rules]]
id = "neon-connection-uri"
description = "Identified a potential Neon Connection URI, which could lead to unauthorized access to Neon services and sensitive data exposure."
regex = '''(?i)\bpostgres(?:ql)?://[^\s:/?#]+:[^\s@/]+@[^\s]*\.neon\.tech[^\s]*'''
keywords = ["neon"]

[[rules]]
id = "openrouter-api-key"
description = "Identified a potential OpenRouter API Key, which could lead to unauthorized access to OpenRouter services and sensitive data exposure."
regex = '''\b(sk-or-v1-[a-f0-9]{64})\b'''
keywords = ["openrouter", "sk-or-v1-"]

[[rules]]
id = "snowflake-postgres-connection-string"
description = "Identified a potential SFPG Connection String, which could lead to unauthorized access to Snowflake services and sensitive data exposure."
regex = '''(?i)\b(?:postgres(?:ql)?|snowflake)://[^\s:/?#]+:[^\s@/]+@[^\s]*snowflake[^\s]*'''
keywords = ["snowflake"]

[[rules]]
id = "snowflake-postgres-host-snowflake-postgres-password"
description = "Identified a potential SFPG Host, which could lead to unauthorized access to Snowflake services and sensitive data exposure."
regex = '''(?i)\b([A-Za-z0-9.-]+\.snowflakecomputing\.com:[A-Za-z0-9._~:/+=-]{16,160})\b'''
keywords = ["snowflake"]

[[rules]]
id = "xai-api-key"
description = "Identified a potential xAI API Key, which could lead to unauthorized access to xAI services and sensitive data exposure."
regex = '''(?i)\b(?:XAI_API_KEY|api\.x\.ai|xAI)\b[^\r\n]{0,80}?\b([A-Za-z0-9._-]{20,160})\b|\b(xai[-_][A-Za-z0-9_-]{20,160})\b'''
keywords = ["xai"]

[[rules]]
id = "brave-search-api-key"
description = "Identified a potential Brave Search API Key, which could lead to unauthorized access to Brave Search services and sensitive data exposure."
regex = '''\b(BSA[A-Za-z0-9_-]{24,40})\b'''
keywords = ["brave", "bsa"]

[[rules]]
id = "clipdrop-api-key"
description = "Identified a potential Clipdrop API Key, which could lead to unauthorized access to Clipdrop services and sensitive data exposure."
regex = '''(?i)\b(?:clipdrop)\b[^\r\n]{0,80}?\b([A-Za-z0-9_-]{24,128})\b'''
keywords = ["clipdrop"]

[[rules]]
id = "firecrawl-api-key"
description = "Identified a potential Firecrawl API Key, which could lead to unauthorized access to Firecrawl services and sensitive data exposure."
regex = '''\b(fc-[a-fA-F0-9]{32})\b'''
keywords = ["firecrawl", "fc-"]

[[rules]]
id = "openai-api-key"
description = "Identified a potential OpenAI API Key, which could lead to unauthorized access to OpenAI services and sensitive data exposure."
regex = '''\b(sk-(?:proj|svcacct|admin)-[A-Za-z0-9_-]{40,120}T3BlbkFJ[A-Za-z0-9_-]{40,120})\b|\b(sk-[A-Za-z0-9]{20}T3BlbkFJ[A-Za-z0-9]{20})\b'''
keywords = ["t3blbkfj", "openai"]

[[rules]]
id = "perplexity-api-key"
description = "Identified a potential Perplexity API Key, which could lead to unauthorized access to Perplexity AI services and sensitive data exposure."
regex = '''\b(pplx-[A-Za-z0-9]{48})\b'''
keywords = ["pplx-", "perplexity"]

[[rules]]
id = "vapi-api-key"
description = "Identified a potential Vapi API Key or Token, which could lead to unauthorized access to Vapi services and sensitive data exposure."
regex = '''(?i)\b(?:vapi|vapi_private_key|vapi_web_token)\b[^\r\n]{0,80}?\b([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})\b|\b(vapi_private_key_[A-Za-z0-9]{20,128})\b'''
keywords = ["vapi"]
