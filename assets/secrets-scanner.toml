[[rules]]
description = "Detected Azure Storage Account Key (kingfisher, confidence: medium)"
entropy = 4.0
id = "kingfisher.azurestorage.2"
keywords = ["azurestorage"]
regex = '''
(?x)
# Avoid leading \b: env vars like MONGODB_..._AZURE_STORAGE_ACCOUNT_KEY have no
# word break before AZURE (alnum or underscore). Consume a non-lowercase char (or
# start-of-input) so we still block mid-camelCase (myAzureStorage...) without using
# a lookbehind, which Vectorscan and the Rust regex crate both reject.
(?:\A|[^a-z])
(?:
  (?i:azure)(?:[_\s-]*(?i:storage))?
  (?:[_\s-]*(?:account[_\s-]*key|storage[_\s-]*key|shared[_\s-]*key|access[_\s-]*key|accountkey))
  |
  (?i:account)[_.\s-]*(?i:key)
  |
  (?i:storage)[_.\s-]*(?i:key)
)
\b
(?:.|[\n\r]){0,24}?
(?:
  [=:]
  |
  ["']\s*:\s*["']
)
\s*
["']?
(
  [A-Za-z0-9+/]{86}==
)
['"]?
'''
secretGroup = 1

