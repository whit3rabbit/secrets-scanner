# sources.toml — the rule-source manifest.
#
# Declares every ruleset source, its merge priority, and whether it is embedded
# into the default (lean) binary.
#
#   priority  Higher number wins id/regex collisions. `local` (100) > `gitleaks`
#             (10) reproduces the historical "local overrides upstream" behaviour.
#   embed     true  -> baked into the default `cargo build` (lean ~460 rules).
#             false -> opt-in only; included when building with
#                      `--features full-ruleset` or running `merge-rules --all`.
#
# Regenerate assets/secrets-scanner.toml after editing this file:
#   make merge-rules        (and commit the result)

schema_version = 1

[[source]]
name       = "local"
file       = "assets/local.toml"
priority   = 100          # hand-curated; always wins
embed      = true
# no update_url: maintained by hand / scripts/convert_csv_to_toml.py

[[source]]
name       = "gitleaks"
file       = "assets/gitleaks.toml"
priority   = 10           # trusted upstream baseline
embed      = true
update_url = "https://raw.githubusercontent.com/gitleaks/gitleaks/refs/heads/master/config/gitleaks.toml"

[[source]]
name       = "kingfisher"
file       = "assets/kingfisher-rules.yml"
priority   = 7            # reference only; DEFERRED (YAML, no TOML converter yet)
embed      = false

[[source]]
name       = "spdb"
file       = "assets/secrets-patterns-db.toml"
priority   = 5            # broad coverage, lower confidence / more noise
embed      = false        # opt-in via --features full-ruleset
# regenerated by scripts/import_secrets_patterns_db.py
